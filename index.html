<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Reports Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS reset & variables */
        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --border: #3f3f46;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .controls h2 {
            font-size: 1.5rem;
            font-weight: 500;
        }

        .btn-add {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
            group: hover;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
            background: var(--bg-surface-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .folder-icon {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .card:hover .folder-icon {
            transform: scale(1.1);
            background: rgba(59, 130, 246, 0.2);
        }

        .folder-name {
            font-size: 1.25rem;
            font-weight: 600;
            word-break: break-all;
            flex: 1;
        }

        .card-path {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 0.5rem;
            word-break: break-all;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1rem;
        }

        .view-link {
            color: #60a5fa;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.3s ease;
        }

        .card:hover .view-link {
            gap: 0.75rem;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            opacity: 0;
        }

        .card:hover .btn-delete {
            opacity: 1;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 50;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            transform: scale(0.95) translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: var(--accent-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(24, 24, 27, 0.4);
            border: 1px dashed var(--border);
            border-radius: 1rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Report Hub</h1>
            <p class="subtitle">A dynamic directory for all your plugin analysis and comparison reports.</p>
        </header>

        <div class="controls">
            <h2>Available Folders</h2>
            <button class="btn-add" id="btnOpenModal">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Folder Link
            </button>
        </div>

        <div class="grid" id="folderGrid">
            <!-- Cards will be dynamically injected here -->
        </div>
    </div>

    <!-- Add Folder Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h3>Add New Folder Link</h3>
            <form id="addForm">
                <div class="form-group">
                    <label for="folderName">Folder Name / Title</label>
                    <input type="text" id="folderName" placeholder="e.g. WP Discount Plugin" required>
                </div>
                <div class="form-group">
                    <label for="folderPath">URL Path</label>
                    <input type="text" id="folderPath" placeholder="e.g. wp_discount_plugin/" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
                    <button type="submit" class="btn-save">Save Link</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Default Folders
        const defaultFolders = [
            {
                id: '1',
                name: "WP Discount Plugin",
                path: "wp_discount_plugin/wp_discount_plugin_comparison.html"
            }
        ];

        // State Management
        let folders = [];
        
        function loadFolders() {
            const saved = localStorage.getItem('dynamicFolders');
            if (saved) {
                folders = JSON.parse(saved);
            } else {
                folders = [...defaultFolders];
                saveFolders();
            }
            renderFolders();
        }

        function saveFolders() {
            localStorage.setItem('dynamicFolders', JSON.stringify(folders));
        }

        // DOM Elements
        const grid = document.getElementById('folderGrid');
        const modal = document.getElementById('addModal');
        const btnOpenModal = document.getElementById('btnOpenModal');
        const btnCancel = document.getElementById('btnCancel');
        const form = document.getElementById('addForm');

        // Render Function
        function renderFolders() {
            grid.innerHTML = '';

            if (folders.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin: 0 auto 1rem; opacity: 0.5;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                        </svg>
                        <p>No folders added yet. Click "Add Folder Link" to create your first dynamic link.</p>
                    </div>
                `;
                return;
            }

            folders.forEach(folder => {
                const card = document.createElement('a');
                card.href = folder.path;
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="folder-icon">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                            </svg>
                        </div>
                        <div class="folder-name">${folder.name}</div>
                    </div>
                    <div class="card-path">${folder.path}</div>
                    <div class="card-footer">
                        <span class="view-link">
                            Open Link
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </span>
                        <button class="btn-delete" data-id="${folder.id}" title="Remove Link">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                `;

                // Handle delete without triggering the link
                const deleteBtn = card.querySelector('.btn-delete');
                deleteBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    deleteFolder(folder.id);
                });

                grid.appendChild(card);
            });
        }

        // Actions
        function deleteFolder(id) {
            folders = folders.filter(f => f.id !== id);
            saveFolders();
            renderFolders();
        }

        function addFolder(name, path) {
            const newFolder = {
                id: Date.now().toString(),
                name,
                path
            };
            folders.push(newFolder);
            saveFolders();
            renderFolders();
        }

        // Modal Events
        btnOpenModal.addEventListener('click', () => {
            modal.classList.add('active');
            document.getElementById('folderName').focus();
        });

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
        }

        btnCancel.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('folderName').value;
            const path = document.getElementById('folderPath').value;
            
            if (name && path) {
                addFolder(name, path);
                closeModal();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', loadFolders);
    </script>
</body>
</html>
